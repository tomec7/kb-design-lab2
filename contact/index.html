    <script>
      (function(){
        var BASE = '/kb-design-lab2';
        function mapUrl(url){
          if (typeof url !== 'string') return url;
          if (url === '/' || url === '/index.html') return BASE + '/';
          if (url.startsWith(BASE + '/')) return url;
          if (url.startsWith('/')) {
            var out = BASE + url;
            if (!out.endsWith('/') && !/\.[a-z0-9]+$/i.test(out) && !out.includes('?') && !out.includes('#')) out += '/';
            return out;
          }
          return url;
        }
        if (location.pathname === BASE) {
          location.replace(BASE + '/' + location.search + location.hash);
          return;
        }
        if (location.pathname.startsWith(BASE + '/') && !location.pathname.endsWith('/') && !/\.[a-z0-9]+$/i.test(location.pathname)) {
          location.replace(location.pathname + '/' + location.search + location.hash);
          return;
        }
        var _push = history.pushState.bind(history);
        var _replace = history.replaceState.bind(history);
        history.pushState = function(s,t,u){ return _push(s,t,mapUrl(u)); };
        history.replaceState = function(s,t,u){ return _replace(s,t,mapUrl(u)); };
        document.addEventListener('click', function(e){
          var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
          if (!a) return;
          var h = a.getAttribute('href');
          if (!h) return;
          if (h.startsWith('/')) a.setAttribute('href', mapUrl(h));
        }, true);
      })();
    </script>

<script>
(function(){
  function applyLazy(){
    var imgs=document.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var img=imgs[i];
      if(i<2){
        if(!img.getAttribute('loading')) img.setAttribute('loading','eager');
      }else{
        img.setAttribute('loading','lazy');
      }
      if(!img.getAttribute('decoding')) img.setAttribute('decoding','async');
    }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',applyLazy,{once:true});
  else applyLazy();
  new MutationObserver(applyLazy).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
