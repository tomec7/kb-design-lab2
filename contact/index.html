    <script>
      (function(){
        var BASE = '/kb-design-lab2';
        function mapUrl(url){
          if (typeof url !== 'string') return url;
          if (url === '/' || url === '/index.html') return BASE + '/';
          if (url.startsWith(BASE + '/')) return url;
          if (url.startsWith('/')) return BASE + url;
          return url;
        }
        if (location.pathname === BASE) {
          location.replace(BASE + '/' + location.search + location.hash);
          return;
        }
        var _push = history.pushState.bind(history);
        var _replace = history.replaceState.bind(history);
        history.pushState = function(s,t,u){ return _push(s,t,mapUrl(u)); };
        history.replaceState = function(s,t,u){ return _replace(s,t,mapUrl(u)); };
        document.addEventListener('click', function(e){
          var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
          if (!a) return;
          var h = a.getAttribute('href');
          if (!h) return;
          if (h.startsWith('/')) a.setAttribute('href', mapUrl(h));
        }, true);
      })();
    </script>

<script>
(function(){
  function enhance(){
    document.querySelectorAll('img').forEach(function(img){
      if(!img.hasAttribute('loading')) img.setAttribute('loading','lazy');
      if(!img.hasAttribute('decoding')) img.setAttribute('decoding','async');
      if(!img.hasAttribute('fetchpriority')) img.setAttribute('fetchpriority','low');
      if(!img.hasAttribute('alt') || img.getAttribute('alt').trim()==='') img.setAttribute('alt','Vizualizácia projektu');
    });
  }
  enhance();
  new MutationObserver(enhance).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
